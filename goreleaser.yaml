version: 2

builds:
  - id: aifr
    main: ./cmd/aifr
    binary: aifr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go.pennock.tech/aifr/internal/version.Version={{.Version}}
      - -X go.pennock.tech/aifr/internal/version.Commit={{.Commit}}
      - -X go.pennock.tech/aifr/internal/version.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: freebsd
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"
