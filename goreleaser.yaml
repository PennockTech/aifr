version: 2

builds:
  - id: aifr
    main: ./cmd/aifr
    binary: aifr
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go.pennock.tech/aifr/internal/version.Version={{.Version}}
      - -X go.pennock.tech/aifr/internal/version.Commit={{.Commit}}
      - -X go.pennock.tech/aifr/internal/version.BuildDate={{.CommitDate}}
      - -X go.pennock.tech/aifr/internal/version.BuiltBy=goreleaser
    goos:
      - linux
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: freebsd
        goarch: arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Cosign keyless signing — signs the checksums file, which transitively
# covers all release archives.  Requires id-token: write in the workflow.
#
# Cosign v2.5+ defaults to --new-bundle-format which produces a single
# .bundle file instead of separate .sig/.pem files.
#
# To verify:
#   cosign verify-blob \
#     --bundle checksums.txt.bundle \
#     --certificate-identity-regexp 'https://github.com/PennockTech/aifr/' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.bundle"
    output: true
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

release:
  footer: |
    ## Verification

    All artifacts are checksummed and the checksums file is signed with
    [cosign](https://github.com/sigstore/cosign) keyless signing (GitHub OIDC).

    ```sh
    # Download the release assets, then verify:
    cosign verify-blob \
      --bundle checksums.txt.bundle \
      --certificate-identity-regexp 'https://github.com/PennockTech/aifr/' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      checksums.txt

    sha256sum -c checksums.txt
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
